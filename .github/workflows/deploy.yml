name: Deploy LifeMap AI

on:
  push:
    branches: [main]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'
  IMAGE_NAME: lifemap-ai
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        run: |
          set -euo pipefail
          if [ ! -d backend ]; then
            echo "backend directory is required" >&2
            exit 1
          fi

          if [ -d frontend ] && [ ! -f frontend/package-lock.json ]; then
            echo "frontend/package-lock.json is required when frontend exists" >&2
            exit 1
          fi

          if [ -z "${{ secrets.DEPLOY_WEBHOOK_URL }}" ]; then
            echo "Missing required secret: DEPLOY_WEBHOOK_URL" >&2
            exit 1
          fi

      # 🔹 Node Setup + Cache
      - name: Setup Node
        if: hashFiles('frontend/package-lock.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend
        run: |
          set -euo pipefail
          if [ -d frontend ]; then
            cd frontend
            npm ci
            npm run build
          else
            echo "No frontend yet; skipping"
          fi

      # 🔹 Python Setup + Cache
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend
        run: |
          set -euo pipefail
          cd backend
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          set -euo pipefail
          cd backend
          PYTHONPATH=. pytest tests -q

      # 🔹 Docker Build with Layer Cache
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          curl --fail --show-error --silent -X POST "$DEPLOY_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d '{"image":"${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest"}'
