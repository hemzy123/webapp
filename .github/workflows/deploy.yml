name: Deploy LifeMap AI

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend
        run: |
          if [ -d frontend ]; then
            cd frontend
            npm ci
            npm run build
          else
            echo "frontend not present yet; skipping"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          cd backend
          PYTHONPATH=. pytest tests -q

      - name: Build Docker Image
        run: docker build -t lifemap-ai .

      - name: Deploy
        run: |
          echo "Deploy step placeholder (Render/Railway/AWS CLI)"
