name: Deploy LifeMap AI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend
        run: |
          if [ -d frontend ]; then
            cd frontend
            npm ci
            npm run build
          else
            echo "frontend not present yet; skipping"
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Backend (if present)
        run: |
          if [ -d backend ]; then
            cd backend
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
          else
            echo "backend not present yet; skipping"
          fi

      - name: Run Backend Tests (if present)
        run: |
          if [ -d backend ] && [ -d backend/tests ]; then
            cd backend
            python -m pytest tests -q
          else
            echo "no backend tests found; skipping"
          fi

      - name: Build Docker Image (if Dockerfile present)
        run: |
          if [ -f Dockerfile ]; then
            docker build -t lifemap-ai .
          else
            echo "Dockerfile not found at repo root; skipping docker build"
          fi

      - name: Deploy
        run: |
          echo "Deploy step placeholder (Render/Railway/AWS CLI)"
